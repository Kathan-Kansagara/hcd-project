services:
  # ── API Server ──────────────────────────────────────────────────
  - type: web
    name: zenon-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: zenon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1

  # ── Frontend (Static Site) ──────────────────────────────────────
  - type: web
    name: zenon-web
    runtime: static
    buildCommand: "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @zenon/web build"
    staticPublishPath: ./apps/web/dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: NODE_VERSION
        value: "22"

databases:
  # ── PostgreSQL + PostGIS ──────────────────────────────────────
  - name: zenon-db
    plan: starter
    databaseName: zenon_croptrial
    user: zenon
    postgresMajorVersion: "16"
    ipAllowList: []
