version: '3.9'

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: zenon-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zenon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      POSTGRES_DB: ${POSTGRES_DB:-zenon_croptrial}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - zenon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zenon} -d ${POSTGRES_DB:-zenon_croptrial}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── API Server (Express + TypeScript) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenon-api-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-zenon}:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/${POSTGRES_DB:-zenon_croptrial}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_string_min_32_chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    volumes:
      - ./uploads:/app/uploads
      - api_logs:/app/logs
    networks:
      - zenon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Nginx (Reverse Proxy + Static Frontend) ──────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: zenon-nginx-prod
    restart: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./uploads:/usr/share/nginx/uploads:ro
    networks:
      - zenon-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  api_logs:
    driver: local

networks:
  zenon-network:
    driver: bridge
