1. Setup Phase:
    - Add Suppliers → Add Raw Materials → Define Product → Create
  Product Recipe
    - Add Customers
  2. Procurement:
    - Create Purchase Order for raw materials from Supplier
    - When materials arrive, create RM Batches in system
  3. Manufacturing:
    - Go to Production → Create production batch
    - Select product, batch number, quantity
    - Record which RM batches were consumed
    - System creates finished product batch
  4. Field Testing (Optional):
    - Create Trial with Farmer
    - Select the batch being tested
    - Track applications and results
    - Batch stock reduces automatically
  5. Sales:
    - Customer places order → Create Sales Order
    - Generate Invoice from sales order
    - Send invoice to customer
    - Record Payment when received
  6. Monitoring:
    - Dashboard shows inventory levels, expiring batches, outstanding
  payments
    - Alerts for low stock or expiring products


