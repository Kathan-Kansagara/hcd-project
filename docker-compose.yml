version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: zenon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenon
      POSTGRES_PASSWORD: zenon_dev_password
      POSTGRES_DB: zenon_croptrial
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - zenon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenon -d zenon_croptrial"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  zenon-network:
    driver: bridge
